# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "11b62ec8c7b47266b97f404e419d7a71"
name = "Rubaiyat ZATCA QR"
application_url = "https://rubaiyat-zatca-qr-1.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_all_orders,read_metaobject_definitions,read_metaobjects,read_order_edits,read_orders,write_metaobject_definitions,write_metaobjects,write_order_edits,write_orders"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://rubaiyat-zatca-qr-1.onrender.com/auth/callback",
  "https://rubaiyat-zatca-qr-1.onrender.com/auth/shopify/callback",
  "https://rubaiyat-zatca-qr-1.onrender.com/api/auth/callback"
]

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"
